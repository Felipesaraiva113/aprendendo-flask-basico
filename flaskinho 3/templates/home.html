<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
</head>
<body>
    <h1>contatos</h1>
    <ul>
        {% for contato in contatos %}
            <li>{{contato.nome}} - {{contato.telefone}} : 
                <a href="/editar/{{contato.id}}">editar</a>
                <a href="/deletar/{{contato.id}}">deletar</a>
        </li>
        {% endfor %}
    </ul>
<a href="/registrar">registrar contato</a>
</body>
</html>
